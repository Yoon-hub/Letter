<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffe8f0" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>To. 공쥬</title>
  <style>
    :root {
      --bg1: #fff6f9;
      --bg2: #ffe8f0;
      --paper: #fffefb;
      --ink: #3d2c34;
      --accent: #ff6fa5;
      --line: #f2dce4;
      --shadow: 0 16px 40px rgba(85, 33, 58, 0.16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    html {
      background: var(--bg2);
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow-x: hidden;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: var(--bg2);
    }

    .page-bg {
      position: fixed;
      top: -120vh;
      left: 0;
      right: 0;
      height: 340vh;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at 20% 0%, #ffe9f2 0%, transparent 45%),
                  radial-gradient(circle at 80% 100%, #ffdbe9 0%, transparent 40%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .page-bg::before,
    .page-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 1.5px, transparent 2px),
        radial-gradient(circle, rgba(255,255,255,.85) 0 1px, transparent 1.5px);
      background-size: 140px 140px, 90px 90px;
      background-position: 0 0, 20px 35px;
      opacity: .35;
      animation: floatBg 16s linear infinite;
    }

    .page-bg::after {
      opacity: .2;
      animation-duration: 24s;
      animation-direction: reverse;
    }

    .page-scroll {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(80px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .page-scroll.is-open {
      display: block;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(80px, env(safe-area-inset-bottom));
    }

    .envelope-wrap {
      width: min(860px, 100%);
      position: relative;
      animation: fadeInUp .9s ease both;
    }

    .page-scroll.is-open .envelope-wrap {
      margin: 0 auto;
    }

    .lock-box {
      width: 92%;
      margin: 0 auto 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .lock-input {
      width: min(280px, 70%);
      height: 42px;
      border: 1px solid #e5b6c9;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
      background: #fff9fc;
      color: #6b2f49;
    }

    .lock-input:focus {
      border-color: #d16f95;
      box-shadow: 0 0 0 3px rgba(255, 111, 165, 0.12);
    }

    .envelope {
      width: 92%;
      height: 56px;
      margin: 0 auto;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(90deg, #ffd2e2, #ffbdd4);
      box-shadow: var(--shadow);
      animation: flapBounce 2.2s ease-in-out infinite;
      transform-origin: bottom center;
      cursor: pointer;
      color: #7c3451;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .3px;
      transition: transform .35s ease, box-shadow .35s ease, opacity .2s ease;
    }

    .letter {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: clamp(20px, 4vw, 40px);
      overflow: hidden;
      position: relative;
      max-height: 0;
      opacity: 0;
      transform: translateY(-16px) scale(.98);
      transition: max-height .9s ease, opacity .45s ease, transform .55s ease, margin-top .45s ease;
      margin-top: -8px;
    }

    .letter::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(to bottom, transparent 35px, rgba(242, 220, 228, .6) 36px);
      background-size: 100% 36px;
      opacity: .55;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      line-height: 1.95;
      font-size: clamp(16px, 2.05vw, 18px);
      word-break: keep-all;
    }

    .letter-body {
      min-height: 120px;
    }

    .typing-line {
      margin: 0 0 14px;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .typing-line.visible {
      opacity: 1;
    }

    .typing-line.typing-active::after {
      content: "▍";
      display: inline-block;
      margin-left: 2px;
      color: var(--accent);
      animation: cursorBlink .75s step-end infinite;
    }

    .typing-line.done {
      opacity: 1;
    }

    .sign {
      margin-top: 24px;
      text-align: right;
      color: #8a3f5c;
      font-weight: 700;
      opacity: 0;
      transition: opacity .6s ease;
    }

    .sign.visible {
      opacity: 1;
    }

    .hint {
      text-align: center;
      font-size: 14px;
      color: #9e5a74;
      margin: 12px 0 0;
      opacity: .95;
      transition: opacity .25s ease;
    }

    .hint.error {
      color: #c13761;
      font-weight: 700;
    }

    .gift-open-btn {
      display: block;
      margin: 16px auto 0;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff8eb5, #ff6fa5);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 11px 18px;
      box-shadow: 0 10px 20px rgba(255, 111, 165, 0.28);
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .3s ease, transform .3s ease;
    }

    .envelope-wrap.open .gift-open-btn {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .gift-open-btn:active {
      transform: scale(.97);
    }

    .gift-modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(40, 18, 30, 0.56);
      backdrop-filter: blur(3px);
    }

    .gift-modal.show {
      display: flex;
    }

    .gift-card {
      width: min(440px, 100%);
      border-radius: 16px;
      background: #fffafc;
      box-shadow: 0 16px 30px rgba(62, 28, 44, 0.25);
      border: 1px solid #f3dbe4;
      overflow: hidden;
    }

    .gift-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f3dbe4;
      font-weight: 700;
      color: #8a3f5c;
      background: #fff2f7;
    }

    .gift-close-btn {
      border: 0;
      background: transparent;
      font-size: 22px;
      line-height: 1;
      color: #9e5a74;
      cursor: pointer;
    }

    .gift-body {
      padding: 16px;
      text-align: center;
    }

    .gift-image {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #f3dbe4;
      background: #fff;
      object-fit: cover;
    }

    .gift-desc {
      margin: 12px 0 10px;
      font-size: 14px;
      color: #7a445c;
    }

    .gift-code {
      margin: 0 0 10px;
      font-size: 13px;
      color: #a15c79;
      word-break: break-all;
    }

    .gift-copy-btn {
      border: 0;
      border-radius: 999px;
      background: #ff73a7;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 16px;
      cursor: pointer;
    }

    .envelope-wrap.open .letter {
      max-height: 4000px;
      opacity: 1;
      transform: translateY(0) scale(1);
      margin-top: 10px;
      overflow: visible;
    }

    .envelope-wrap.open .envelope {
      animation: none;
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(85, 33, 58, 0.13);
    }

    .envelope-wrap.open .hint {
      opacity: 0;
    }

    .to {
      color: #cf4f7f;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: .4px;
      animation: textGlow 2s ease-in-out infinite alternate;
    }

    .heart {
      display: inline-block;
      margin-left: 6px;
      color: var(--accent);
      animation: heartBeat 1.2s ease infinite;
    }

    .music-btn {
      position: fixed;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 10;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 20px rgba(85, 33, 58, 0.18);
      color: #b24a72;
      font-size: 20px;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease;
    }

    .music-btn:active {
      transform: scale(.94);
    }

    .music-btn.playing {
      animation: musicPulse 1.4s ease-in-out infinite;
    }

    .fall-particle {
      position: fixed;
      top: -24px;
      z-index: 5;
      pointer-events: none;
      font-size: clamp(12px, 3vw, 16px);
      color: rgba(255, 111, 165, 0.75);
      text-shadow: 0 0 8px rgba(255, 180, 210, 0.5);
      animation: particleFall linear forwards;
      will-change: transform, opacity;
    }

    .fall-particle.star {
      color: rgba(255, 200, 120, 0.85);
      text-shadow: 0 0 8px rgba(255, 220, 160, 0.45);
    }

    @keyframes cursorBlink {
      50% { opacity: 0; }
    }

    @keyframes particleFall {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 0;
      }
      8% { opacity: 0.85; }
      100% {
        transform: translateY(105vh) rotate(280deg) scale(0.6);
        opacity: 0;
      }
    }

    @keyframes musicPulse {
      0%, 100% { box-shadow: 0 8px 20px rgba(85, 33, 58, 0.18); }
      50% { box-shadow: 0 8px 24px rgba(255, 111, 165, 0.35); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flapBounce {
      0%, 100% { transform: rotateX(0deg); }
      50% { transform: rotateX(10deg); }
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.18); }
      45% { transform: scale(0.98); }
      65% { transform: scale(1.12); }
    }

    @keyframes textGlow {
      from { text-shadow: 0 0 0 rgba(255, 111, 165, 0); }
      to { text-shadow: 0 0 12px rgba(255, 111, 165, 0.25); }
    }

    @keyframes floatBg {
      from { transform: translateY(0); }
      to { transform: translateY(-140px); }
    }
  </style>
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>
  <div class="page-scroll" id="pageScroll">
  <main class="envelope-wrap" id="letterWrap">
    <div class="lock-box">
      <input class="lock-input" id="codeInput" type="password" inputmode="numeric" placeholder="비밀번호 8자리 입력" maxlength="8" />
    </div>
    <button class="envelope" id="openLetterBtn" aria-expanded="false" aria-controls="birthdayLetter">봉투 열기 💌</button>
    <p class="hint" id="openHint">비밀번호를 입력하고 봉투를 눌러줘</p>
    <article class="letter" id="birthdayLetter" aria-label="생일 편지">
      <div class="content">
        <div class="to">To. 이뿌니</div>
        <div class="letter-body" id="letterBody" aria-live="polite"></div>
        <div class="sign" id="letterSign">공쥬를 많이 많이 사랑하는 윤제가<span class="heart">♥</span></div>
      </div>
    </article>
    <button class="gift-open-btn" id="giftOpenBtn" type="button">🎁 선물 열기</button>
  </main>
  </div>
  <div class="gift-modal" id="giftModal" aria-hidden="true">
    <div class="gift-card" role="dialog" aria-modal="true" aria-labelledby="giftTitle">
      <div class="gift-head">
        <span id="giftTitle">공쥬를 위한 선물</span>
        <button class="gift-close-btn" id="giftCloseBtn" type="button" aria-label="선물 닫기">×</button>
      </div>
      <div class="gift-body">
        <!-- 같은 폴더에 gifticon.jpg를 넣으면 실제 기프티콘 이미지로 표시됩니다 -->
        <img class="gift-image" src="gifticon.jpg" alt="기프티콘 이미지" />
        <p class="gift-desc"> 생일 선물을 미리 줘가지궁 ㅎㅎ 기분 내려구 같이 코피 먹쟝 💝</p>
        <p class="gift-code" id="giftCodeText">사랑💙❤️💜💚🩷</p>
        <button class="gift-copy-btn" id="giftCopyBtn" type="button">코드 복사</button>
      </div>
    </div>
  </div>
  <!-- 같은 폴더에 bgm.mp3 파일을 넣어주세요 -->
  <audio id="bgm" loop preload="auto">
    <source src="bgm.mp3" type="audio/mpeg" />
  </audio>
  <button class="music-btn" id="musicBtn" type="button" aria-label="배경음악 재생" title="배경음악">🎵</button>
  <script>
    (function () {
      var wrap = document.getElementById("letterWrap");
      var pageScroll = document.getElementById("pageScroll");
      var button = document.getElementById("openLetterBtn");
      var codeInput = document.getElementById("codeInput");
      var hint = document.getElementById("openHint");
      var bgm = document.getElementById("bgm");
      var musicBtn = document.getElementById("musicBtn");
      var giftOpenBtn = document.getElementById("giftOpenBtn");
      var giftModal = document.getElementById("giftModal");
      var giftCloseBtn = document.getElementById("giftCloseBtn");
      var giftCopyBtn = document.getElementById("giftCopyBtn");
      var giftCodeText = document.getElementById("giftCodeText");
      var letterBody = document.getElementById("letterBody");
      var letterSign = document.getElementById("letterSign");
      var passcode = "20250901";
      var unlocked = false;
      var musicStarted = false;
      var typingDone = false;
      var typingRunning = false;
      var hasTypedOnce = false;
      var typingTimer = null;
      var lastScrollY = 0;
      var scrollCooldown = false;
      var ambientFallTimer = null;

      var letterParagraphs = [
        "안녕 공쥬 우리가 만난지도 벌써 300일이라는 시간이 다 되가네 짧다면 짧은 시간이고 길다면 긴 시간이지만, 밀도로 따지자면 정말 밀도있는 시간 들이였다구 생각해! 밀도 있는 시간을 보낸만큼 사랑하는 마음도 커진 것 같아",
        "공쥬랑 함께하는 시간은 뭘해도 다 재미있는 것 같아 같이 야구를 보는 것도 밥을 먹는 것도 드라이브를 하는 것도 그냥 침대에 누워서 선풍기 바람 쌔는 것도 평범한 일상들이 더 특별하게 느껴지는 것 같아서 하루하루 행복함을 느끼고 있어! 고마워, 그리구 요즘 공쥬 미모가 전성기야 요롷게 보면 이쁘고 죠롷게 보면 너무 귀여워 침대에 누워서 공쥬 볼따구 보는게 너무 좋아! 잡아 먹고 싶은 기분이 너무 많이 들어서 힘들어😭",
        "앞으로도 이렇게 사이좋게 지냈으면 좋겠어 오빠가 속상하게 행동해두 착한 공쥬가 너그럽게 봐줬으면 좋겠오ㅠ 그리구 속상한일 있으면 바로바로 말해줘! 나두 병원 생활 때문에 공쥬 힘드니까 최대한 챙겨주려구 노력할게!",
        "그리구 병원 힘들면 언제든지 오빠한테 속상한거 힘든거 다 이야기 해죠! 위로하구 같이 욕해줄게! 그만두고 싶으면 오빠가 먹여 살릴테니까 걱정하지마! 나한테는 이제 세상에서 제일 소중한 사람이니까 다른 곳에 이직 한다구 한다면 뒷바라지 확실하게 해줄게!",
        "나는 공쥬가 어떤 선택을 하든 항상 응원할거야 😀",
        "26번째 생일 진심으로 축하해 재은아, 앞으로도 잘 부탁하고 27번쨰, 28번째 ... 100번째 생일까지 옆에서 제일 먼저 축하해줄게 🥳",
        "오늘 하루도 같이 즐겁게 보냈겠지? 롯데야.. 오늘은 이겨야 한다 진짜루.."
      ];

      if (!wrap || !button || !codeInput || !hint || !letterBody) return;

      function delay(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      function stopTypingTimer() {
        if (typingTimer) {
          clearInterval(typingTimer);
          typingTimer = null;
        }
      }

      function typeParagraph(element, text) {
        var step = text.length > 120 ? 3 : 2;
        var tick = text.length > 120 ? 10 : 14;

        return new Promise(function (resolve) {
          var index = 0;
          element.classList.add("visible", "typing-active");
          element.textContent = "";

          typingTimer = setInterval(function () {
            if (index >= text.length) {
              stopTypingTimer();
              element.classList.remove("typing-active");
              element.classList.add("done");
              resolve();
              return;
            }
            element.textContent += text.slice(index, index + step);
            index += step;
          }, tick);
        });
      }

      function showLetterInstantly() {
        letterBody.innerHTML = "";
        letterParagraphs.forEach(function (text) {
          var line = document.createElement("p");
          line.className = "typing-line done visible";
          line.textContent = text;
          letterBody.appendChild(line);
        });
        if (letterSign) {
          letterSign.classList.add("visible");
        }
        typingDone = true;
      }

      function resetLetterView() {
        stopTypingTimer();
        typingRunning = false;
        if (letterSign) {
          letterSign.classList.remove("visible");
        }
      }

      async function startTyping() {
        if (typingRunning || hasTypedOnce) return;
        typingRunning = true;
        typingDone = false;
        letterBody.innerHTML = "";

        for (var i = 0; i < letterParagraphs.length; i++) {
          if (!wrap.classList.contains("open")) {
            typingRunning = false;
            return;
          }
          var line = document.createElement("p");
          line.className = "typing-line";
          letterBody.appendChild(line);
          await typeParagraph(line, letterParagraphs[i]);
          await delay(180);
        }

        if (letterSign) {
          letterSign.classList.add("visible");
        }
        typingDone = true;
        typingRunning = false;
        hasTypedOnce = true;
      }

      function spawnFallParticles(count) {
        var symbols = [
          { text: "♥", star: false },
          { text: "♡", star: false },
          { text: "✦", star: true },
          { text: "✧", star: true }
        ];

        for (var i = 0; i < count; i++) {
          var item = symbols[Math.floor(Math.random() * symbols.length)];
          var particle = document.createElement("span");
          particle.className = "fall-particle" + (item.star ? " star" : "");
          particle.textContent = item.text;
          particle.style.left = (8 + Math.random() * 84) + "vw";
          particle.style.animationDuration = (2.4 + Math.random() * 1.4) + "s";
          particle.style.animationDelay = (Math.random() * 0.25) + "s";
          document.body.appendChild(particle);
          particle.addEventListener("animationend", function () {
            particle.remove();
          });
        }
      }

      function startAmbientParticles() {
        if (ambientFallTimer) return;
        ambientFallTimer = setInterval(function () {
          if (document.hidden) return;
          spawnFallParticles(1 + Math.floor(Math.random() * 2));
        }, 2200);
      }

      function stopAmbientParticles() {
        if (!ambientFallTimer) return;
        clearInterval(ambientFallTimer);
        ambientFallTimer = null;
      }

      window.addEventListener("scroll", function () {
        if (!wrap.classList.contains("open") || !typingDone) return;

        var currentY = window.scrollY || window.pageYOffset;
        if (currentY > lastScrollY + 28 && !scrollCooldown) {
          spawnFallParticles(2 + Math.floor(Math.random() * 2));
          scrollCooldown = true;
          setTimeout(function () {
            scrollCooldown = false;
          }, 500);
        }
        lastScrollY = currentY;
      }, { passive: true });

      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          stopAmbientParticles();
        } else {
          startAmbientParticles();
        }
      });

      function setMusicPlaying(isPlaying) {
        if (!musicBtn) return;
        musicBtn.textContent = isPlaying ? "🔊" : "🎵";
        musicBtn.classList.toggle("playing", isPlaying);
        musicBtn.setAttribute("aria-label", isPlaying ? "배경음악 일시정지" : "배경음악 재생");
      }

      function playMusic() {
        if (!bgm) return;
        bgm.volume = 0.45;
        bgm.play().then(function () {
          musicStarted = true;
          setMusicPlaying(true);
        }).catch(function () {
          setMusicPlaying(false);
        });
      }

      function pauseMusic() {
        if (!bgm) return;
        bgm.pause();
        setMusicPlaying(false);
      }

      if (musicBtn && bgm) {
        musicBtn.addEventListener("click", function () {
          if (bgm.paused) {
            playMusic();
          } else {
            pauseMusic();
          }
        });
      }

      function openGiftModal() {
        if (!giftModal) return;
        giftModal.classList.add("show");
        giftModal.setAttribute("aria-hidden", "false");
      }

      function closeGiftModal() {
        if (!giftModal) return;
        giftModal.classList.remove("show");
        giftModal.setAttribute("aria-hidden", "true");
      }

      if (giftOpenBtn) {
        giftOpenBtn.addEventListener("click", function () {
          openGiftModal();
        });
      }

      if (giftCloseBtn) {
        giftCloseBtn.addEventListener("click", function () {
          closeGiftModal();
        });
      }

      if (giftModal) {
        giftModal.addEventListener("click", function (event) {
          if (event.target === giftModal) {
            closeGiftModal();
          }
        });
      }

      if (giftCopyBtn && giftCodeText) {
        giftCopyBtn.addEventListener("click", function () {
          var value = (giftCodeText.textContent || "").trim();
          if (!value) return;
          navigator.clipboard.writeText(value).then(function () {
            giftCopyBtn.textContent = "복사 완료!";
            setTimeout(function () {
              giftCopyBtn.textContent = "코드 복사";
            }, 1200);
          });
        });
      }

      codeInput.addEventListener("input", function () {
        hint.classList.remove("error");
      });

      startAmbientParticles();

      button.addEventListener("click", function () {
        if (!unlocked) {
          if (codeInput.value !== passcode) {
            hint.classList.add("error");
            hint.textContent = "비밀번호가 틀렸어. 다시 입력해줘.";
            codeInput.focus();
            return;
          }
          unlocked = true;
          codeInput.disabled = true;
          hint.classList.remove("error");
          hint.textContent = "비밀번호 확인 완료. 편지를 열었어 💗";
        }
        var isOpen = wrap.classList.toggle("open");
        if (pageScroll) {
          pageScroll.classList.toggle("is-open", isOpen);
        }
        button.setAttribute("aria-expanded", String(isOpen));
        button.textContent = isOpen ? "편지 읽는 중... 💗" : "봉투 열기 💌";

        if (isOpen && !musicStarted) {
          playMusic();
        }

        if (isOpen) {
          if (hasTypedOnce) {
            showLetterInstantly();
          } else {
            setTimeout(function () {
              startTyping();
            }, 350);
          }
        } else {
          closeGiftModal();
          if (typingRunning) {
            stopTypingTimer();
            showLetterInstantly();
            hasTypedOnce = true;
            typingRunning = false;
          }
          resetLetterView();
        }
      });
    })();
  </script>
</body>
</html>
